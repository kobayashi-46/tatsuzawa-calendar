<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>龍澤学館グループ マスターカレンダー 2026年度</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Sans','Meiryo',sans-serif;background:#f5f7fa;color:#37485A}
.wrap{max-width:1300px;margin:0 auto;padding:1.5rem}
.topbar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:12px}
.cal-title{font-size:20px;font-weight:600;color:#37485A}
.cal-title span{color:#00BAA5}
.vtog{display:flex;border:1.5px solid #00BAA5;border-radius:6px;overflow:hidden;margin-left:auto}
.vtog button{padding:5px 14px;font-size:13px;border:none;cursor:pointer;background:white;color:#37485A;font-family:inherit;outline:none}
.vtog button.active{background:#00BAA5;color:#fff;font-weight:500}
.nav{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.navbtn{width:30px;height:30px;border:1px solid #ccc;border-radius:5px;background:white;cursor:pointer;font-size:15px;color:#37485A;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.navbtn:hover{background:#e0f7f5}
.tdbtn{height:30px;padding:0 13px;font-size:13px;border:1px solid #ccc;border-radius:5px;background:white;cursor:pointer;color:#666;font-family:inherit;white-space:nowrap;display:inline-flex;align-items:center;flex-shrink:0;line-height:1}
.tdbtn:hover{background:#e0f7f5}
.nav-lbl{font-size:16px;font-weight:600;color:#37485A;min-width:180px;text-align:center}


.srow:last-child{margin-bottom:0}


.surl:focus{outline:none;border-color:#00BAA5}









.fbar{background:white;border:1px solid #e0e0e0;border-radius:8px;padding:10px 14px;margin-bottom:10px}
.frow{display:flex;flex-wrap:wrap;gap:5px;align-items:center;margin-bottom:5px}
.frow:last-child{margin-bottom:0}
.flbl{font-size:12px;color:#888;min-width:48px;font-weight:500}
.schip{padding:3px 10px;border-radius:20px;font-size:11px;cursor:pointer;border:1.5px solid;font-family:inherit;transition:opacity .15s}
.schip.off{opacity:.22}
.ccat{padding:4px 12px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid #ccc;background:#f5f5f5;color:#666;font-family:inherit}
.ccat.on{background:#37485A;color:#fff;border-color:#37485A}
.sa{font-size:12px;color:#00BAA5;cursor:pointer;text-decoration:underline;background:none;border:none;margin-left:6px;font-family:inherit}

/* レイアウト */
.layout-side{display:grid;grid-template-columns:1fr 240px;gap:12px;align-items:start}
@media(max-width:767px){.layout-side{display:block}}

/* 月グリッド */
.mgrid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:1px;background:#ddd;border:1px solid #ddd;border-radius:8px;overflow:hidden}
.dh{background:#37485A;color:#fff;text-align:center;padding:7px;font-size:12px;font-weight:500}
.dc{background:white;min-height:90px;padding:4px;cursor:pointer}
.dc:hover{background:#f5f5f5}
.dc.om{background:#f8f8f8}
.dn-wrap{display:flex;margin-bottom:2px}
.dn{font-size:12px;color:#aaa;width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:50%;font-weight:400}
.dc.sun .dn{color:#e05}.dc.sat .dn{color:#00BAA5}
.dc.tod .dn{background:#00BAA5;color:#fff;font-weight:600}
.dc.sel .dn{background:#37485A;color:#fff;font-weight:600}
.dc.tod.sel .dn{background:#37485A;color:#fff;outline:2px solid #00BAA5;outline-offset:1px}
.ep{padding:2px 5px;border-radius:3px;font-size:10px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hp{background:#fde8e8;color:#c00;font-size:10px;margin-bottom:2px;padding:2px 5px;border-radius:3px;font-weight:500}
.more{font-size:10px;color:#00BAA5;font-weight:500;padding:1px 4px;cursor:pointer}

/* サイドパネル */
.side-panel{background:white;border:1px solid #e0e0e0;border-radius:8px;overflow:hidden;position:sticky;top:12px}
.side-hd{background:#37485A;color:#fff;padding:9px 14px;font-size:13px;font-weight:500}
.side-body{padding:10px 14px;max-height:400px;overflow-y:auto}
.side-ev{display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:0.5px solid #eee}
.side-ev:last-child{border-bottom:none}
.side-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:3px}
.side-sch{font-size:10px;color:#888}
.side-ttl{font-size:13px;font-weight:500;color:#37485A}
.side-hint{font-size:12px;color:#ccc;padding:8px 0;text-align:center}
.side-empty{font-size:12px;color:#aaa;padding:8px 0}
@media(max-width:767px){.side-panel{display:none}}

/* モーダル（スマホ用） */
.modal-bg{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(55,72,90,0.45);z-index:100;align-items:center;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:white;border-radius:10px;width:90%;max-width:340px;overflow:hidden;border:1px solid #ddd}
.modal-hd{background:#37485A;color:#fff;padding:10px 14px;display:flex;align-items:center;justify-content:space-between}
.modal-hd span{font-size:14px;font-weight:500}
.modal-close{background:none;border:none;color:#fff;font-size:18px;cursor:pointer;padding:0 2px;line-height:1}
.modal-body{padding:12px 14px;max-height:50vh;overflow-y:auto}
.modal-ev{display:flex;gap:8px;padding:7px 0;border-bottom:0.5px solid #eee}
.modal-ev:last-child{border-bottom:none}
.modal-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:3px}
.modal-sch{font-size:11px;color:#888}
.modal-ttl{font-size:13px;font-weight:500;color:#37485A}
@media(min-width:768px){.modal-bg{display:none!important}}

/* 週ビュー */
.wgrid{display:grid;grid-template-columns:48px repeat(7,minmax(0,1fr));border:1px solid #ddd;border-radius:8px;overflow:hidden}
.wdh{background:#37485A;color:#fff;text-align:center;padding:7px 2px;border-right:1px solid rgba(255,255,255,0.12);cursor:pointer}
.wdh.todh{background:#00BAA5}.wdh.selh{outline:2px solid #00BAA5;outline-offset:-2px}
.wdh.todh.selh{outline:2px solid #fff;outline-offset:-3px}
.wdh.sunh{background:#c0392b}.wdh.sath{background:#1a6fad}
.wdh-date{font-size:18px;font-weight:500;display:block;line-height:1.3}
.wdh-day{font-size:11px;opacity:.8}
.wlbl{background:#f5f5f5;border-right:1px solid #eee;border-top:1px solid #eee;font-size:10px;color:#aaa;text-align:right;padding:3px 6px}
.wcell{border-right:1px solid #eee;border-top:1px solid #eee;background:white;padding:3px;min-height:44px;cursor:pointer}
.wcell.selw{background:#e8f4fb}.wcell.todw{background:#e6faf8}

/* 日ビュー */
.day-wrap{border:1px solid #ddd;border-radius:8px;overflow:hidden}
.dhrow{display:grid;grid-template-columns:48px 1fr}
.darow{display:grid;grid-template-columns:48px 1fr;border-bottom:1px solid #eee;min-height:48px}
.dslot{display:grid;grid-template-columns:48px 1fr;border-bottom:1px solid #eee}
.dst{font-size:10px;color:#aaa;padding:3px 6px;text-align:right;border-right:1px solid #eee;background:#f5f5f5}
.dse{padding:3px;min-height:36px;background:white}

/* 年間ビュー */
.ygrid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
@media(max-width:700px){.ygrid{grid-template-columns:1fr 1fr}}
@media(max-width:460px){.ygrid{grid-template-columns:1fr}}
.ymm{border:1px solid #ddd;border-radius:8px;overflow:hidden;background:white}
.ymh{background:#37485A;color:#fff;padding:7px 10px;font-size:13px;font-weight:500}
.ymg{display:grid;grid-template-columns:repeat(7,minmax(0,1fr))}
.ymdh{text-align:center;font-size:10px;padding:3px 0;color:#888;background:#f5f5f5}
.ymd{text-align:center;font-size:11px;padding:2px 1px;min-height:24px;cursor:pointer}
.ymd.oth{color:#ddd}
.ymd .yn{display:inline-flex;width:20px;height:20px;align-items:center;justify-content:center;border-radius:50%}
.ymd.tody .yn{background:#00BAA5;color:#fff;font-weight:600}
.ymd.sely .yn{background:#37485A;color:#fff}
.ymd.tody.sely .yn{background:#37485A;color:#fff;outline:2px solid #00BAA5;outline-offset:1px}
.ymd.suny{color:#e05}.ymd.saty{color:#00BAA5}
.drow{display:flex;gap:1px;justify-content:center;margin-top:1px;flex-wrap:wrap}
.dot{width:4px;height:4px;border-radius:50%;display:inline-block}

/* 凡例 */
.leg{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px;background:white;border-radius:8px;padding:10px 14px;border:1px solid #e0e0e0}
.li{display:flex;align-items:center;gap:5px;font-size:11px;color:#555}
.ld{width:10px;height:10px;border-radius:50%;flex-shrink:0}

.login-screen{position:fixed;top:0;left:0;right:0;bottom:0;background:#f5f7fa;display:flex;align-items:center;justify-content:center;z-index:1000}
.login-card{background:white;border-radius:12px;padding:40px 48px;text-align:center;border:1px solid #e0e0e0;max-width:380px;width:90%}
.login-logo{height:48px;margin-bottom:20px}
.login-title{font-size:18px;font-weight:600;color:#37485A;margin-bottom:6px}
.login-sub{font-size:13px;color:#888;margin-bottom:28px}
.login-err{font-size:12px;color:#c00;margin-top:12px;display:none}
</style>
</head>

let actS=new Set(SCH_MASTER.map(s=>s.name)),actC=new Set(['OC','行事','試験','祝日']);

function dk(y,m,d){return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}
function isT(y,m,d){return today.getFullYear()===y&&today.getMonth()+1===m&&today.getDate()===d;}
function isS(y,m,d){return selDate&&selDate.getFullYear()===y&&selDate.getMonth()+1===m&&selDate.getDate()===d;}
function scol(n){const s=SCH_MASTER.find(x=>x.name===n);return s?s.color:'#888';}
function getEvs(key){
  const evs=RAW.filter(e=>e.date===key&&actS.has(e.school)&&actC.has(e.cat));
  const h=HOL[key];
  if(h&&actC.has('祝日'))evs.unshift({_hol:true,title:h,school:'祝日',color:'#e05'});
  return evs;
}

function chipStyle(s){
  if(s.chip==='solid') return `background:${s.color};color:#fff;border-color:${s.color}`;
  if(s.chip==='outline') return `background:transparent;color:${s.color};border-color:${s.color}`;
  return `background:${s.color}20;color:${s.color};border-color:${s.color}`;
}

function renderCal(){
  const outer=document.getElementById('calOuter');
  if(view==='month'){
    const grid=rMonth(cur.getFullYear(),cur.getMonth()+1);
    if(!isMobile()){
      const selKey=selDate?dk(selDate.getFullYear(),selDate.getMonth()+1,selDate.getDate()):null;
      const evs=selKey?getEvs(selKey):[];
      const dateStr=selDate?`${selDate.getFullYear()}年${selDate.getMonth()+1}月${selDate.getDate()}日（${WN[selDate.getDay()]}）`:'日付を選択';
      let sideBody=selDate&&evs.length===0?'<div class="side-empty">イベントなし</div>':
        selDate?evs.map(e=>{const col=e._hol?'#e05':scol(e.school);return `<div class="side-ev"><span class="side-dot" style="background:${col}"></span><div><div class="side-sch">${e.school}</div><div class="side-ttl">${e.title}</div></div></div>`;}).join('')
        :'<div class="side-hint">日付をクリックしてください</div>';
      outer.innerHTML=`<div class="layout-side"><div>${grid}</div><div class="side-panel"><div class="side-hd" id="sideHd">${dateStr}</div><div class="side-body" id="sideBody">${sideBody}</div></div></div>`;
    } else {
      outer.innerHTML=grid;
    }
  } else if(view==='week'){
    const ws=new Date(cur);ws.setDate(cur.getDate()-cur.getDay());
    outer.innerHTML=rWeek(ws);
  } else if(view==='day'){
    selDate=new Date(cur);outer.innerHTML=rDay(cur);
  } else {
    outer.innerHTML=rYear(cur.getFullYear());
  }
}

function rMonth(y,m){
  const fd=new Date(y,m-1,1).getDay(),dim=new Date(y,m,0).getDate(),dp=new Date(y,m-1,0).getDate();
  let h='<div class="mgrid">',nd=1;
  WN.forEach(d=>h+=`<div class="dh">${d}</div>`);
  for(let i=0;i<42;i++){
    const col=i%7;
    if(i<fd){
      const pd=dp-fd+i+1,pm=m===1?12:m-1,py=m===1?y-1:y;
      h+=`<div class="dc om" onclick="selDay(${py},${pm},${pd})"><div class="dn-wrap"><span class="dn" style="color:#ddd">${pd}</span></div></div>`;
    }else{
      const day=i-fd+1;
      if(day>dim){
        const nm=m===12?1:m+1,ny=m===12?y+1:y;
        h+=`<div class="dc om" onclick="selDay(${ny},${nm},${nd})"><div class="dn-wrap"><span class="dn" style="color:#ddd">${nd++}</span></div></div>`;
      }else{
        const key=dk(y,m,day),tod=isT(y,m,day),sel=isS(y,m,day),evs=getEvs(key);
        let cls='dc'+(col===0?' sun':col===6?' sat':'')+(tod?' tod':'')+(sel?' sel':'');
        h+=`<div class="${cls}" onclick="selDay(${y},${m},${day})">`;
        h+=`<div class="dn-wrap"><span class="dn">${day}</span></div>`;
        evs.slice(0,3).forEach(e=>{
          if(e._hol)h+=`<div class="hp">${e.title}</div>`;
          else h+=`<div class="ep" style="background:${scol(e.school)}20;color:${scol(e.school)}" title="${e.school}: ${e.title}">${e.school.slice?e.school.slice(0,4):e.school} ${e.title}</div>`;
        });
        if(evs.length>3)h+=`<div class="more" onclick="event.stopPropagation();selDay(${y},${m},${day})">+${evs.length-3}件</div>`;
        h+='</div>';
      }
    }
  }
  return h+'</div>';
}

function rWeek(ws){
  const days=[];for(let i=0;i<7;i++){const d=new Date(ws);d.setDate(d.getDate()+i);days.push(d);}
  let h='<div class="wgrid"><div style="background:#37485A;border-right:1px solid rgba(255,255,255,0.12)"></div>';
  days.forEach((d,i)=>{
    const tod=d.toDateString()===today.toDateString(),sel=selDate&&d.toDateString()===selDate.toDateString();
    let cls='wdh'+(tod?' todh':'')+(sel?' selh':'')+(i===0&&!tod?' sunh':i===6&&!tod?' sath':'');
    h+=`<div class="${cls}" onclick="selDay(${d.getFullYear()},${d.getMonth()+1},${d.getDate()})"><span class="wdh-date">${d.getDate()}</span><span class="wdh-day">${WN[i]}</span></div>`;
  });
  h+='<div class="wlbl">終日</div>';
  days.forEach(d=>{
    const key=dk(d.getFullYear(),d.getMonth()+1,d.getDate()),evs=getEvs(key);
    const tod=d.toDateString()===today.toDateString(),sel=selDate&&d.toDateString()===selDate.toDateString();
    h+=`<div class="wcell${sel?' selw':tod?' todw':''}" onclick="selDay(${d.getFullYear()},${d.getMonth()+1},${d.getDate()})">`;
    evs.forEach(e=>{
      if(e._hol)h+=`<div class="hp" style="margin-bottom:1px">${e.title}</div>`;
      else h+=`<div class="ep" style="background:${scol(e.school)}20;color:${scol(e.school)};margin-bottom:1px">${e.title}</div>`;
    });
    h+='</div>';
  });
  ['午前','正午','午後'].forEach(s=>{
    h+=`<div class="wlbl">${s}</div>`;
    days.forEach(d=>{
      const tod=d.toDateString()===today.toDateString(),sel=selDate&&d.toDateString()===selDate.toDateString();
      h+=`<div class="wcell${sel?' selw':tod?' todw':''}" onclick="selDay(${d.getFullYear()},${d.getMonth()+1},${d.getDate()})"></div>`;
    });
  });
  return h+'</div>';
}

function rDay(date){
  const key=dk(date.getFullYear(),date.getMonth()+1,date.getDate()),evs=getEvs(key);
  const tod=date.toDateString()===today.toDateString(),col=date.getDay();
  const hbg=tod?'#00BAA5':col===0?'#c0392b':col===6?'#1a6fad':'#37485A';
  let h='<div class="day-wrap"><div class="dhrow">';
  h+=`<div style="background:#f5f5f5;padding:8px;font-size:11px;color:#aaa;text-align:center;border-right:1px solid #eee">終日</div>`;
  h+=`<div style="background:${hbg};color:#fff;padding:8px 14px;font-size:14px;font-weight:600">${date.getFullYear()}年${date.getMonth()+1}月${date.getDate()}日（${WN[col]}）${tod?' — 今日':''}</div>`;
  h+='</div><div class="darow">';
  h+=`<div style="font-size:10px;color:#aaa;padding:6px;text-align:right;border-right:1px solid #eee;background:#f5f5f5">終日</div>`;
  h+=`<div style="padding:6px;background:${tod?'#e6faf8':'white'}">`;
  if(evs.length===0)h+='<span style="font-size:12px;color:#ccc">イベントなし</span>';
  evs.forEach(e=>{
    const col=e._hol?'#e05':scol(e.school);
    if(e._hol)h+=`<span class="hp" style="display:inline-flex;margin:2px 4px 2px 0;padding:4px 10px">${e.title}</span>`;
    else h+=`<span class="ep" style="display:inline-flex;background:${col}20;color:${col};padding:4px 10px;font-size:12px;margin:2px 4px 2px 0;border-radius:4px">${e.school}　${e.title}</span>`;
  });
  h+='</div></div>';
  ['8:00','9:00','10:00','11:00','12:00','13:00','14:00','15:00','16:00','17:00','18:00'].forEach(s=>{
    h+=`<div class="dslot"><div class="dst">${s}</div><div class="dse" style="background:${tod?'#e6faf8':'white'}"></div></div>`;
  });
  return h+'</div>';
}

function rYear(fy){
  const months=[];
  for(let i=4;i<=12;i++)months.push({y:fy,m:i});
  for(let i=1;i<=3;i++)months.push({y:fy+1,m:i});
  let h='<div class="ygrid">';
  months.forEach(({y,m})=>{
    const fd=new Date(y,m-1,1).getDay(),dim=new Date(y,m,0).getDate();
    h+=`<div class="ymm"><div class="ymh">${y}年 ${MN[m-1]}</div><div class="ymg">`;
    WN.forEach(d=>h+=`<div class="ymdh">${d}</div>`);
    for(let i=0;i<fd;i++)h+='<div class="ymd oth"></div>';
    for(let day=1;day<=dim;day++){
      const col=(fd+day-1)%7,key=dk(y,m,day);
      const tod=isT(y,m,day),sel=isS(y,m,day),hol=HOL[key];
      const evs=RAW.filter(e=>e.date===key&&actS.has(e.school)&&actC.has(e.cat));
      let cls='ymd';
      if(!tod&&!sel){if((hol&&actC.has('祝日'))||col===0)cls+=' suny';else if(col===6)cls+=' saty';}
      if(tod)cls+=' tody';if(sel)cls+=' sely';
      const dots=evs.map(e=>`<span class="dot" style="background:${scol(e.school)}"></span>`).join('');
      h+=`<div class="${cls}" onclick="selDay(${y},${m},${day})"><span class="yn">${day}</span><div class="drow">${dots}</div></div>`;
    }
    h+='</div></div>';
  });
  return h+'</div>';
}

function rLeg(){
  const vis=SCH_MASTER.filter(s=>actS.has(s.name));
  document.getElementById('leg').innerHTML=vis.map(s=>`<div class="li"><span class="ld" style="background:${s.color}"></span>${s.short}</div>`).join('');
}
